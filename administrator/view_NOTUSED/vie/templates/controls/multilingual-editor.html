<div>
  <tabset>
    <tab ng-repeat="language in languages">
      <tab-heading>
        {{language.name}} <img ng-src="../image/flags/{{language.image}}" title="{{language.name}}">
      </tab-heading>  
      <summernote height="200" ng-model="value[language.code]" on-blur="blur()"></summernote>
    </tab>
  </tabset>
</div>
