<div>
	<div class="input-group" ng-repeat="language in languages" ng-init="log()">
		<input type="text" class="form-control" ng-model="value[language.language_id]" />
		<span class="input-group-addon btn-white"><img ng-src="../image/flags/{{language.image}}" title="{{language.name}}"></span>
	</div>
</div>
